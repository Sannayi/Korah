    <title>مشغل البث</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        /* League Header */
        .league-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .league-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            position: relative;
            display: inline-block;
            padding: 0 20px;
        }

        .league-name::before,
        .league-name::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 2px;
            background: rgba(255,255,255,0.3);
        }

        .league-name::before { right: 100%; }
        .league-name::after { left: 100%; }

        /* Teams Section */
        .teams-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 25px;
            padding: 15px 30px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .team {
            display: flex;
            flex-direction: column;
       gap: 8px;
                 align-items: center;
        }

        .team-image {
            width: 65px;
            height: 65px;
          
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        .team-image img {
            width: 60px;
            height: 60px;
            object-fit: cover;
                    }

        .team-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .vs-badge {
            color: #ffffff;
            font-weight: 600;
            font-size: 2rem;
            padding: 5px 25px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
        }

        /* Server Buttons */
        .server-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .server-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .server-btn:hover,
        .server-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
        }

        /* Frame Container */
        .frame-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            background: #000;
        }

        /* Background Image */
        .background-image {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1200');
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
        }

        /* Overlay for loading */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        /* Spinner */
        .spinner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: #ffffff;
            border-right-color: #ffffff;
            animation: spin 2.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Loading Text */
        .loading-text {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-shadow: 0 2px 10px black;
            background: rgba(0,0,0,0.5);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
        }

        /* Loading Bar */
        .loading-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 20;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: white;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* Fullscreen Button */
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            width: 10px;
            height: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 30;
            text-shadow: 0 2px 5px black;
            transition: all 0.2s ease;
                               }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.2);
        }

        /* Warning Message */
        .warning-message {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 35;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(5px);
        }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .league-name { font-size: 1.5rem; }
            .team-image { width: 50px; height: 50px; }
            .vs-badge { font-size: 1.5rem; padding: 3px 18px; }
            .spinner { width: 60px; height: 60px; }
            .loading-text { font-size: 1rem; }
        }
    </style>

        <!-- Server Buttons -->
        <div class="server-buttons" id="serverButtons"></div>

        <!-- Main Frame -->
        <div class="frame-container" id="frameContainer">
            <!-- Background Image -->
            <div class="background-image"></div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner" id="spinner"></div>
                <div class="loading-text" id="loadingText">جاري تحميل البث المباشر...</div>
            </div>
            
            <!-- Loading Bar -->
            <div class="loading-bar-container">
                <div class="loading-bar-fill" id="loadingBarFill"></div>
            </div>
            
            <!-- Fullscreen Button -->
            <div class="fullscreen-btn" id="fullscreenBtn">
                <i class="fas fa-expand"></i>
            </div>
            
            <!-- Warning Message -->
            <div class="warning-message hidden" id="warningMessage">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="warningText">الإنترنت غير مستقر - يرجى التبديل لسيرفر آخر</span>
            </div>
        </div>
    </div>

    <script>
        // سيرفرات وهمية
        const servers = [
            { name: 'سيرفر 1', url: 'https://www.effectivegatecpm.com/ayen9fpa?key=c784df3c11023853964967c1f7c1f570' },
            { name: 'سيرفر 2', url: 'https://www.effectivegatecpm.com/pwkxqi85pc?key=22e11f76a8436b9bb12db5416969085a' },
            { name: 'سيرفر 3', url: 'https://www.effectivegatecpm.com/jbjpy898u?key=f7616c8a1efea52c3c246187ac5dba80' }
        ];

        // العناصر
        const serverDiv = document.getElementById('serverButtons');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const frameContainer = document.getElementById('frameContainer');
        const warningMsg = document.getElementById('warningMessage');
        const warningText = document.getElementById('warningText');
        const spinner = document.getElementById('spinner');
        const loadingText = document.getElementById('loadingText');
        const loadingBar = document.getElementById('loadingBarFill');

        // أزرار السيرفرات
        servers.forEach((s, i) => {
            const btn = document.createElement('button');
            btn.className = `server-btn ${i === 0 ? 'active' : ''}`;
            btn.innerHTML = `<i class="fas fa-server"></i> ${s.name}`;
            btn.onclick = () => {
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // تحميل وهمي جديد
                loadingText.textContent = 'جاري التبديل إلى سيرفر آخر...';
                spinner.style.animation = 'spin 0.8s infinite cubic-bezier(0.4, 0, 0.2, 1)';
                loadingBar.style.width = '0%';
                
                setTimeout(() => {
                    loadingText.textContent = 'جاري تحميل البث المباشر...';
                    spinner.style.animation = 'spin 2.2s infinite cubic-bezier(0.4, 0, 0.2, 1)';
                }, 2000);
            };
            serverDiv.appendChild(btn);
        });

        // شريط التحميل
        let percent = 0;
        setInterval(() => {
            if (percent < 95) {
                percent += Math.random() * 5;
                if (percent > 95) percent = 95;
                loadingBar.style.width = percent + '%';
            }
        }, 800);

        // رسالة تحذير كل 10 ثواني
        setInterval(() => {
            // رسايل مختلفة
            const msgs = [
                'الإنترنت غير مستقر - يرجى التبديل لسيرفر آخر',
                'سرعة الإتصال منخفضة - جاري إعادة المحاولة',
                'تأخير في إستجابة السيرفر',
                'فقدان الإتصال - إعادة تحميل...'
            ];
            warningText.textContent = msgs[Math.floor(Math.random() * msgs.length)];
            warningMsg.classList.remove('hidden');
            
            // تسريع الدائرة
            spinner.style.animation = 'spin 0.6s infinite cubic-bezier(0.4, 0, 0.2, 1)';
            loadingText.textContent = 'محاولة إعادة الإتصال...';
            
            setTimeout(() => {
                warningMsg.classList.add('hidden');
                spinner.style.animation = 'spin 2.2s infinite cubic-bezier(0.4, 0, 0.2, 1)';
                loadingText.textContent = 'جاري تحميل البث المباشر...';
            }, 3000);
        }, 10000);

        // الدائرة تفصل وتوصل
        setInterval(() => {
            if (Math.random() > 0.5) {
                spinner.style.animation = 'none';
                loadingText.textContent = 'في إنتظار الإتصال...';
                
                setTimeout(() => {
                    spinner.style.animation = 'spin 2.2s infinite cubic-bezier(0.4, 0, 0.2, 1)';
                    loadingText.textContent = 'جاري تحميل البث المباشر...';
                }, 1500);
            }
        }, 7000);

        // Fullscreen
        fullscreenBtn.onclick = () => {
            if (!document.fullscreenElement) {
                frameContainer.requestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        };

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.innerHTML = document.fullscreenElement ? 
                '<i class="fas fa-compress"></i>' : 
                '<i class="fas fa-expand"></i>';
        });
    </script>
